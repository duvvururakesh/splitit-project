version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: splitit_postgres
    environment:
      POSTGRES_USER: splitit
      POSTGRES_PASSWORD: splitit
      POSTGRES_DB: splitit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: splitit_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
