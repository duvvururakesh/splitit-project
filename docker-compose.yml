version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: splitit_backend
    environment:
      DATABASE_URL: postgresql://splitit:splitit@postgres:5432/splitit
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev-secret-key
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      APP_URL: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: splitit_postgres
    environment:
      POSTGRES_USER: splitit
      POSTGRES_PASSWORD: splitit
      POSTGRES_DB: splitit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: splitit_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
